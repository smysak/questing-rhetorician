<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Rhetorician's Quest</title>
		<link rel="stylesheet" href="styles.css">
		<script src="gamescript.js" defer></script>
	</head>
	<body>
		<div class="header">
			<img src="images/logo.svg">
			<h1>Rhetorician's Quest</h1>
		</div>
		<div id="gamespaceArea">
			<div id="introduction">
				<p>You are a budding young rhetorician. Will you take up the quest?</p>
				<p><button id="startGame">START QUEST</button></p>
			</div>
			<div id="protospaceArea" class="hidden">
				<p>You are questing. You see ahead the possibility of a new encounter!</p>
				<p><button id="startEncounter">BEGIN</button></p>
			</div>
			<div id="encounterArea" class="hidden">
				<p>You encounter a <span id="adjective"></span> peasant!</p>
				<p>You have a choice of diction.</p>
				<br />
				<p>You say: <span id="sentenceBody"></span></p>
				<br />
				<div class="selections">
					<button id="a"></button><button id="b"></button><button id="c"></button>
				</div>
			</div>
		</div>
	</body>
</html>
